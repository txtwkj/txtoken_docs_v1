name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate OpenAPI docs
        # Skip if you don't have the upstream HTTP source; the project already
        # ships a checked-in openapi/generated/ directory used by Fumadocs.
        run: |
          if [ -f "./openapi/NewAPI.apifox.json" ]; then
            bun run generate:openapi || echo "openapi generation skipped/failed, using checked-in files"
          else
            echo "no apifox source, using checked-in openapi/generated/"
          fi

      - name: Build with Next.js
        # Pre-build script (scripts/prebuild.ts) is run via npm prebuild hook.
        # For static export, this emits the site to ./out.
        run: bun run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
